<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BIM Labs</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <a href="#" class="brand">BIM LABS</a>

    <nav>
      <a href="#work">Work</a>
      <a href="#systems">Systems</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- HERO SPLINE -->
  <section class="hero-spline">

    <canvas id="canvas3d"></canvas>

    <div class="hero-gradient"></div>

  </section>

  <!-- HERO TEXT -->
  <section class="hero-copy">

    <p class="eyebrow">
      IMMERSIVE WEB STUDIO
    </p>

    <h1>
      Websites that feel like premium digital systems.
    </h1>

    <p class="hero-description">
      BIM Labs builds cinematic websites, AI workflows,
      portals, and immersive digital experiences for brands
      that want to feel modern, premium, and unforgettable.
    </p>

    <div class="hero-actions">

      <a href="#contact" class="btn btn-primary">
        Start a Project
      </a>

      <a href="#work" class="btn btn-secondary">
        See Work
      </a>

    </div>

  </section>

  <!-- SPLINE RUNTIME -->
  <script type="module">

    import { Application }
    from "https://unpkg.com/@splinetool/runtime@1.10.57/build/runtime.js";

    const canvas = document.getElementById("canvas3d");

    const app = new Application(canvas);

    app.load(
      "https://prod.spline.design/dCoa7QA6gWEMZniI/scene.splinecode"
    );

  </script>

</body>
</html>
