<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1448 1086" role="img" aria-labelledby="orbTitle orbDesc">
  <title id="orbTitle">Editable monochrome glass orb</title>
  <desc id="orbDesc">A dark glass orb built from editable SVG shapes, gradients, masks, and paths rather than a flattened traced image.</desc>

  <defs>
    <radialGradient id="backgroundGlow" cx="50%" cy="49%" r="58%">
      <stop offset="0%" stop-color="#242326" />
      <stop offset="48%" stop-color="#08080a" />
      <stop offset="100%" stop-color="#020203" />
    </radialGradient>

    <radialGradient id="orbFill" cx="37%" cy="27%" r="76%">
      <stop offset="0%" stop-color="#f1f1ef" />
      <stop offset="13%" stop-color="#a4a3a0" />
      <stop offset="34%" stop-color="#4d4c4c" />
      <stop offset="67%" stop-color="#171719" />
      <stop offset="100%" stop-color="#050507" />
    </radialGradient>

    <radialGradient id="orbInnerGlow" cx="39%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72" />
      <stop offset="16%" stop-color="#d9d9d7" stop-opacity="0.24" />
      <stop offset="52%" stop-color="#4b4a4b" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="rimStroke" x1="460" y1="254" x2="1035" y2="827" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f0ee" stop-opacity="0.88" />
      <stop offset="31%" stop-color="#666568" stop-opacity="0.42" />
      <stop offset="70%" stop-color="#0b0b0c" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18" />
    </linearGradient>

    <linearGradient id="ringStroke" x1="399" y1="384" x2="1059" y2="722" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="28%" stop-color="#7f7e7d" stop-opacity="0.32" />
      <stop offset="59%" stop-color="#272628" stop-opacity="0.17" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>

    <linearGradient id="highlightStroke" x1="548" y1="299" x2="976" y2="730" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="48%" stop-color="#ededeb" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <filter id="softShadow" x="12%" y="10%" width="76%" height="84%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18" />
      <feOffset dx="0" dy="28" result="offsetBlur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.58" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="surfaceBlur" x="20%" y="16%" width="60%" height="68%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" />
    </filter>

    <mask id="orbMask" maskUnits="userSpaceOnUse">
      <rect width="1448" height="1086" fill="black" />
      <circle cx="724" cy="543" r="301" fill="white" />
    </mask>
  </defs>

  <rect class="background" width="1448" height="1086" fill="url(#backgroundGlow)" />

  <g id="editable-orb" filter="url(#softShadow)">
    <ellipse class="ground-shadow" cx="735" cy="873" rx="263" ry="46" fill="#000000" opacity="0.58" />

    <g id="orb-body">
      <circle class="orb-base" cx="724" cy="543" r="301" fill="url(#orbFill)" />
      <circle class="orb-inner-glow" cx="724" cy="543" r="297" fill="url(#orbInnerGlow)" />
      <circle class="orb-rim" cx="724" cy="543" r="302" fill="none" stroke="url(#rimStroke)" stroke-width="12" />
      <circle class="orb-rim-dark" cx="724" cy="543" r="286" fill="none" stroke="#020203" stroke-width="22" opacity="0.38" />
    </g>

    <g id="orb-surface-lines" mask="url(#orbMask)" fill="none" stroke-linecap="round">
      <ellipse class="latitude latitude-upper" cx="724" cy="488" rx="282" ry="102" stroke="url(#ringStroke)" stroke-width="7" opacity="0.68" />
      <ellipse class="latitude latitude-middle" cx="724" cy="552" rx="302" ry="127" stroke="#e4e4e3" stroke-width="4" opacity="0.19" />
      <ellipse class="latitude latitude-lower" cx="724" cy="628" rx="262" ry="100" stroke="#4d4c4c" stroke-width="6" opacity="0.48" />
      <ellipse class="longitude longitude-left" cx="645" cy="543" rx="114" ry="296" stroke="#f1f1ef" stroke-width="3" opacity="0.17" transform="rotate(-18 645 543)" />
      <ellipse class="longitude longitude-right" cx="790" cy="543" rx="118" ry="292" stroke="#6d6c6c" stroke-width="5" opacity="0.2" transform="rotate(20 790 543)" />
      <path class="front-arc" d="M421 555C475 686 583 773 724 784C858 795 977 722 1029 606" stroke="#f4f4f2" stroke-width="5" opacity="0.23" />
      <path class="back-arc" d="M473 422C572 315 737 276 871 338C952 375 1015 445 1042 529" stroke="#ffffff" stroke-width="4" opacity="0.2" />
      <path class="dark-fold" d="M492 696C579 739 676 758 779 739C890 718 967 658 1003 583" stroke="#050507" stroke-width="24" opacity="0.26" />
    </g>

    <g id="specular-highlights" mask="url(#orbMask)">
      <ellipse class="large-highlight" cx="610" cy="405" rx="95" ry="186" fill="#ffffff" opacity="0.17" transform="rotate(34 610 405)" filter="url(#surfaceBlur)" />
      <path class="rim-highlight" d="M550 340C650 282 781 286 889 349C970 397 1026 474 1044 566" fill="none" stroke="url(#highlightStroke)" stroke-width="9" stroke-linecap="round" opacity="0.62" />
      <path class="left-glint" d="M407 507C414 425 459 359 529 318" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.27" />
      <circle class="pin-light" cx="584" cy="315" r="13" fill="#f6f6f4" opacity="0.5" />
      <circle class="pin-light-small" cx="628" cy="298" r="6" fill="#ffffff" opacity="0.58" />
    </g>
  </g>
</svg>
