<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GSA Prep | Gateway Legacy Sports Academy</title>

  <link rel="stylesheet" href="./GWAY/css/gateway-base.css" />
  <link rel="stylesheet" href="./GWAY/css/gateway-header.css" />
  <link rel="stylesheet" href="./GWAY/css/gateway-hero.css" />
  <link rel="stylesheet" href="./GWAY/css/gateway-responsive.css" />
</head>

<body>
  <main class="gateway-site">

  <header class="gway-header" aria-label="Site header">
  <a class="gway-brand" href="#home" data-animate="hero-brand">
    <div class="gway-wordmark">
      <strong>GLCA <span>PREP</span></strong>
      <small>Gateway Legacy Sports Academy</small>
    </div>
  </a>

  <nav class="gway-nav" aria-label="Main navigation" data-animate="hero-nav">
    <a class="is-active" href="#home">Home</a>
    <a href="#academics">Academics</a>
    <a href="#athletics">Athletics</a>
    <a href="#admissions">Admissions</a>
  </nav>

  <button class="gway-menu" type="button" aria-label="Open menu" data-animate="hero-menu">
    <span>Menu</span>
    <i></i>
  </button>
</header>

<section class="gway-hero" id="home">
  <div class="gway-hero-bg" aria-hidden="true"></div>
  <div class="gway-hero-shade" aria-hidden="true"></div>

  <div class="gway-hero-content">
    <h1 data-animate="hero-title">
      <span>Where</span>
      <span class="red-word">Discipline</span>
      <span>Builds <em>Legacy</em></span>
    </h1>

    <p class="gway-hero-copy" data-animate="hero-copy">
      Elite academics. Competitive athletics. Character-driven leadership.
    </p>

    <div class="gway-hero-actions" data-animate="hero-actions">
      <a class="gway-btn gway-btn-red" href="#academy">
        Explore Academy
        <span>→</span>
      </a>

      <a class="gway-btn gway-btn-outline" href="#apply">
        Apply Now
        <span>→</span>
      </a>
    </div>
  </div>
</section>

  </main>
</body>
</html>
