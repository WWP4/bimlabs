<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GSA Prep | Gateway Legacy Sports Academy</title>

  <link rel="stylesheet" href="./GWAY/css/gateway-base.css" />
  <link rel="stylesheet" href="./GWAY/css/gateway-header.css" />

  <link rel="stylesheet" href="./GWAY/css/gateway-responsive.css" />
</head>

<body>
  <main class="gateway-site">

<header class="gway-header" aria-label="Site header">
  <a class="gway-brand" href="#home" data-animate="hero-brand">
    <strong>GLCA <span>PREP</span></strong>
    <small>Gateway Legacy Sports Academy</small>
  </a>

  <div class="gway-header-right">
    <a class="gway-apply-link" href="#apply" data-animate="hero-apply">
      Apply Now
      <span>→</span>
    </a>

    <button class="gway-menu" type="button" aria-label="Open menu" data-animate="hero-menu">
      <span>Menu</span>
      <i></i>
    </button>
  </div>
</header>

<section class="gway-hero" id="home">
  <div class="gway-hero-bg" aria-hidden="true"></div>
  <div class="gway-hero-overlay" aria-hidden="true"></div>

  <div class="gway-hero-content">
    <h1 data-animate="hero-title">
      <span>Where</span>
      <span class="red-word">Discipline</span>
      <span>Builds Legacy</span>
    </h1>

    <div class="gway-hero-bottom" data-animate="hero-copy">
      <p>
        Elite academics.<br />
        Competitive athletics.<br />
        Character-driven leadership.
      </p>
    </div>
  </div>
</section>



<!-- SECTION 2: ENROLLMENT -->

  <div class="enroll-bg" aria-hidden="true"></div>

  <div class="enroll-content">

  </div>
</section>




    
  </main>
